name: Get Hot News

on:
  schedule:
    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    # ⚠️ 试用版说明 / Trial Mode
    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    #
    # 🔄 运行机制 / How it works:
    #    - 每个周期为 7 天，届时自动停止
    #    - 运行 "Check In" 会重置周期（重新开始 7 天倒计时，而非累加）
    #    - Each cycle is 7 days, then auto-stops
    #    - "Check In" resets the cycle (restarts 7-day countdown, not cumulative)
    #
    # 💡 设计初衷 / Why this design:
    #    如果 7 天都忘了签到，或许这些资讯对你来说并非刚需
    #    适时的暂停，能帮你从信息流中抽离，给大脑留出喘息的空间
    #    If you forget for 7 days, maybe you don't really need it
    #    A timely pause helps you detach from the stream and gives your mind space
    #
    # 🙏 珍惜资源 / Respect shared resources:
    #    GitHub Actions 是平台提供的公共资源，每次运行都会消耗算力
    #    签到机制确保资源分配给真正需要的用户，感谢你的理解与配合
    #    GitHub Actions is a shared public resource provided by the platform
    #    Check-in ensures resources go to those who truly need it — thank you
    #
    # 🚀 长期使用请部署 Docker 版本 / For long-term use, deploy Docker version
    #
    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    #
    # 📝 修改运行时间：只改第一个数字（0-59），表示每小时第几分钟运行
    # 📝 Change time: Only modify the first number (0-59) = minute of each hour
    #
    # 示例 / Examples:
    #   "15 * * * *"     → 每小时第15分钟 / minute 15 every hour
    #   "30 0-14 * * *"  → 北京时间 8:00-22:00 每小时第30分钟 / Beijing 8am-10pm
    #
    - cron: "30 0,4,14 * * *"

  workflow_dispatch:

concurrency:
  group: crawler-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          clean: true

      - name: Check Expiration
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          WORKFLOW_FILE="crawler.yml"
          API_URL="repos/${{ github.repository }}/actions/workflows/$WORKFLOW_FILE/runs"

          TOTAL=$(gh api "$API_URL" --jq '.total_count')
          if [ -z "$TOTAL" ] || [ "$TOTAL" -eq 0 ]; then
            echo "No previous runs found, skipping expiration check"
            exit 0
          fi

          LAST_PAGE=$(( (TOTAL + 99) / 100 ))
          FIRST_RUN_DATE=$(gh api "$API_URL?per_page=100&page=$LAST_PAGE" --jq '.workflow_runs[-1].created_at')

          if [ -n "$FIRST_RUN_DATE" ]; then
            CURRENT_TIMESTAMP=$(date +%s)
            FIRST_RUN_TIMESTAMP=$(date -d "$FIRST_RUN_DATE" +%s)
            DIFF_SECONDS=$((CURRENT_TIMESTAMP - FIRST_RUN_TIMESTAMP))
            LIMIT_SECONDS=604800

            if [ $DIFF_SECONDS -gt $LIMIT_SECONDS ]; then
              echo "⚠️ 试用期已结束，请运行 'Check In' 签到续期"
              echo "⚠️ Trial expired. Run 'Check In' to renew."
              gh workflow disable "$WORKFLOW_FILE"
              exit 1
            else
              DAYS_LEFT=$(( (LIMIT_SECONDS - DIFF_SECONDS) / 86400 ))
              echo "✅ 试用期剩余 ${DAYS_LEFT} 天，到期前请运行 'Check In' 签到续期"
              echo "✅ Trial: ${DAYS_LEFT} days left. Run 'Check In' before expiry to renew."
            fi
          fi


      # --------------------------------------------------------------------------------
      # 🚦 TRAFFIC CONTROL / 流量控制
      # --------------------------------------------------------------------------------
      # EN: Generates a random delay between 1 and 300 seconds (5 minutes).
      #     Critical for load balancing.
      #
      # CN: 生成 1 到 300 秒（5分钟）之间的随机延迟。
      #     这对负载均衡至关重要。
      # - name: Random Delay (Traffic Control)
      #   if: success()
      #   run: |
      #     echo "🎲 Traffic Control: Generating random delay..."
      #     DELAY=$(( ( RANDOM % 300 )  + 1 ))
      #     echo "⏸️  Sleeping for ${DELAY} seconds to spread the load..."
      #     sleep ${DELAY}s
      #     echo "▶️  Delay finished. Starting crawler..."

      - name: Set up Python
        if: success()
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        if: success()
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        if: success()
        run: uv sync --frozen --no-dev

      - name: Verify required files
        if: success()
        run: |
          if [ ! -f config/config.yaml ]; then
            echo "Error: Config missing"
            exit 1
          fi

      - name: Run crawler
        if: success()
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DINGTALK_WEBHOOK_URL: ${{ secrets.DINGTALK_WEBHOOK_URL }}
          WEWORK_WEBHOOK_URL: ${{ secrets.WEWORK_WEBHOOK_URL }}
          WEWORK_MSG_TYPE: ${{ secrets.WEWORK_MSG_TYPE }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_SMTP_SERVER: ${{ secrets.EMAIL_SMTP_SERVER }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_SERVER_URL: ${{ secrets.NTFY_SERVER_URL }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
          BARK_URL: ${{ secrets.BARK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          # 通用Webhook配置
          GENERIC_WEBHOOK_URL: ${{ secrets.GENERIC_WEBHOOK_URL }}
          GENERIC_WEBHOOK_TEMPLATE: ${{ secrets.GENERIC_WEBHOOK_TEMPLATE }}
          # AI 配置（ai_analysis 和 ai_translation 共享模型配置）
          AI_ANALYSIS_ENABLED: ${{ secrets.AI_ANALYSIS_ENABLED }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          AI_API_BASE: ${{ secrets.AI_API_BASE }}
          # 远程存储配置
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
          S3_REGION: ${{ secrets.S3_REGION }}
          GITHUB_ACTIONS: true
        run: uv run python -m trendradar

      # check index.html file after crawler 
      #- name: Check generated files after crawler
      #  if: always()
      #  run: |
      #    pwd
      #    ls -lh index.html || true
      #    ls -lh output/index.html || true
      #    find . -maxdepth 5 -name "*.html" -type f -print -exec ls -lh {} \;
      
      # retrieve html history from r2 and deploy news to Cloudflare
      - name: Restore HTML history from R2
        if: success()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        run: |
          python -m pip install --upgrade pip
          pip install awscli

          rm -rf public
          mkdir -p public

          echo "Restore previous HTML history from R2..."
          aws s3 sync "s3://$S3_BUCKET_NAME/html" public \
            --endpoint-url "$S3_ENDPOINT_URL"

          echo "Restored files:"
          find public -maxdepth 5 -type f -print || true

      - name: Merge current TrendRadar HTML
        if: success()
        run: |
          echo "Current generated HTML files:"
          find . -maxdepth 6 -name "*.html" -type f -print || true

          mkdir -p public

          if [ -d output/html ]; then
            cp -r output/html/* public/
          fi

          if [ -f index.html ]; then
            cp index.html public/index.html
          elif [ -f output/index.html ]; then
            cp output/index.html public/index.html
          elif [ -f public/latest/current.html ]; then
            cp public/latest/current.html public/index.html
          else
            echo "No index.html found"
            find . -maxdepth 6 -name "*.html" -type f -print
            exit 1
          fi

          echo "Final public files:"
          find public -maxdepth 6 -type f -print | sort

      - name: Cleanup old local HTML before deploy
        if: success()
        run: |
          python - <<'PY'
          import os
          import re
          import shutil
          from pathlib import Path
          from datetime import datetime, timedelta

          def read_retention_days():
              config_path = Path("config/deploy.yaml")
              default_days = 30

              if not config_path.exists():
                  print("config/deploy.yaml not found, use default 30 days")
                  return default_days

              try:
                  for line in config_path.read_text(encoding="utf-8").splitlines():
                      line = line.strip()
                      if line.startswith("retention_days:"):
                          value = line.split(":", 1)[1].strip()
                          return int(value)
              except Exception as exc:
                  print(f"Failed to read config/deploy.yaml, use default 30 days: {exc}")
                  return default_days

              print("html.retention_days not found, use default 30 days")
              return default_days

          retention_days = read_retention_days()
          cutoff = datetime.now().date() - timedelta(days=retention_days)
          date_pattern = re.compile(r"^\d{4}-\d{2}-\d{2}$")

          if not os.path.isdir("public"):
              raise SystemExit("public directory not found")

          deleted = 0
          for name in os.listdir("public"):
              path = os.path.join("public", name)

              # 只清理 public/2026-05-16 这种日期目录
              # 不动 public/index.html、public/latest、public/history.html
              if os.path.isdir(path) and date_pattern.match(name):
                  folder_date = datetime.strptime(name, "%Y-%m-%d").date()
                  if folder_date < cutoff:
                      print(f"Deleting old html folder: {path}")
                      shutil.rmtree(path)
                      deleted += 1

          print(f"HTML retention days: {retention_days}")
          print(f"Deleted old html folders: {deleted}")
          PY


      - name: Generate history index
        if: success()
        run: |
          python - <<'PY'
          from pathlib import Path
          from datetime import datetime

          public = Path("public")
          rows = []

          for date_dir in sorted(public.iterdir(), reverse=True):
              if not date_dir.is_dir():
                  continue

              name = date_dir.name
              if len(name) != 10 or name[4] != "-" or name[7] != "-":
                  continue

              for html_file in sorted(date_dir.glob("*.html"), reverse=True):
                  rel = html_file.relative_to(public).as_posix()
                  title = f"{name} {html_file.stem.replace('-', ':')}"
                  rows.append((title, rel))

          items = "\n".join(
              f'<li><a href="/{rel}">{title}</a></li>'
              for title, rel in rows
          )

          html = f"""<!doctype html>
          <html lang="zh-CN">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>TrendRadar 历史报告</title>
            <style>
              body {{
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                max-width: 960px;
                margin: 40px auto;
                padding: 0 20px;
                line-height: 1.6;
              }}
              h1 {{ font-size: 28px; }}
              li {{ margin: 8px 0; }}
              a {{ color: #2563eb; text-decoration: none; }}
              a:hover {{ text-decoration: underline; }}
            </style>
          </head>
          <body>
            <h1>TrendRadar 历史报告</h1>
            <p>更新时间：{datetime.now().strftime("%Y-%m-%d %H:%M:%S")}</p>
            <p><a href="/#tab-0">返回最新报告</a></p>
            <ul>
              {items or "<li>暂无历史报告</li>"}
            </ul>
          </body>
          </html>
          """

          (public / "history.html").write_text(html, encoding="utf-8")
          print(f"Generated history.html with {len(rows)} reports")
          PY


      - name: Save HTML history to R2
        if: success()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        run: |
          test -f public/index.html

          echo "Files to sync:"
          find public -maxdepth 5 -type f -print | sort

          aws s3 sync public "s3://$S3_BUCKET_NAME/html" \
            --endpoint-url "$S3_ENDPOINT_URL" \
            --content-type "text/html; charset=utf-8" \
            --delete

      # do not use workers, it is not useful in cn network
      #- name: Deploy to Cloudflare Worker
      #  if: success()
      #  uses: cloudflare/wrangler-action@v3
      #  with:
      #    apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      #    accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      #    wranglerVersion: "4"
      #    command: deploy --name ${{ secrets.CLOUDFLARE_WORKER_NAME }}

      - name: Deploy to Cloudflare Pages
        if: success()
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=${{ secrets.CLOUDFLARE_PAGE_NAME }} --branch=main


      - name: Send Worker link to WeCom
        if: success()
        env:
          WEWORK_WEBHOOK_URL: ${{ secrets.WEWORK_WEBHOOK_URL }}
          WEWORK_MSG_TYPE: ${{ secrets.WEWORK_MSG_TYPE }}
          REPORT_URL: ${{ secrets.REPORT_URL }}
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import urllib.request
          from pathlib import Path

          webhook = os.environ.get("WEWORK_WEBHOOK_URL", "").strip()
          msg_type = os.environ.get("WEWORK_MSG_TYPE", "markdown").strip().lower()
          report_url_raw = os.environ.get("REPORT_URL", "").strip()

          if not webhook:
              print("WEWORK_WEBHOOK_URL is empty, skip WeCom notification")
              raise SystemExit(0)

          # 支持换行、逗号、分号分隔多个 URL
          urls = [
              item.strip()
              for item in re.split(r"[\n,;]+", report_url_raw)
              if item.strip()
          ]

          latest_url = urls[0] if len(urls) >= 1 else ""
          history_url = urls[1] if len(urls) >= 2 else ""

          # REPORT_URL 没填：跳过 CF Worker 链接推送，但不让 workflow 失败
          if not latest_url:
              print("REPORT_URL is empty, skip CF Worker link notification")
              raise SystemExit(0)

          history_exists = Path("public/history.html").exists()

          content_lines = [
              "【TrendRadar 网页版报告】",
              "",
              "本期热点报告已更新。",
              "",
              "查看最新新闻：",
              latest_url,
          ]

          if history_url and history_exists:
              content_lines.extend([
                  "",
                  "查看历史新闻：",
                  history_url,
              ])
          else:
              content_lines.extend([
                  "",
                  "历史新闻：暂无可用历史页，后续生成后会自动开放。",
              ])

          content = "\n".join(content_lines)

          # markdown 模式也不使用 [文字](链接)，只发送裸链接，方便复制和个人微信查看
          if msg_type == "text":
              payload = {
                  "msgtype": "text",
                  "text": {
                      "content": content
                  }
              }
          else:
              payload = {
                  "msgtype": "markdown",
                  "markdown": {
                      "content": content
                  }
              }

          req = urllib.request.Request(
              webhook,
              data=json.dumps(payload, ensure_ascii=False).encode("utf-8"),
              headers={"Content-Type": "application/json"},
              method="POST",
          )

          try:
              with urllib.request.urlopen(req, timeout=20) as resp:
                  print(resp.read().decode("utf-8", errors="ignore"))
          except Exception as exc:
              print(f"WeCom notification failed, but workflow will continue: {exc}")
              raise SystemExit(0)
          PY


